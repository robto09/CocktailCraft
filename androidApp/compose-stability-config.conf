// Compose stability configuration (AN-1).
//
// The shared KMP module has no Compose dependency, so its domain models can't
// carry @Immutable. Declaring them stable here lets the Compose compiler skip
// composables like AnimatedCocktailItem when their inputs are unchanged —
// without this, Cocktail.ingredients (a plain List) made every row
// non-skippable and each parent recomposition re-executed all visible rows.
//
// Everything listed is a val-only data class (or enum) in shared/commonMain.
// If a var is ever added to one of these models, REMOVE it from this list.
com.cocktailcraft.domain.model.Cocktail
com.cocktailcraft.domain.model.CocktailIngredient
com.cocktailcraft.domain.model.CocktailCartItem
com.cocktailcraft.domain.model.Order
com.cocktailcraft.domain.model.OrderItem
com.cocktailcraft.domain.model.OrderStatistics
com.cocktailcraft.domain.model.Review
com.cocktailcraft.domain.model.SearchFilters
com.cocktailcraft.domain.model.NutritionFacts
com.cocktailcraft.domain.model.User
com.cocktailcraft.domain.model.Address
com.cocktailcraft.domain.model.UserPreferences
