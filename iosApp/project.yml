name: CocktailCraft
options:
  bundleIdPrefix: com.cocktailcraft
  deploymentTarget:
    iOS: 15.0

targets:
  CocktailCraft:
    type: application
    platform: iOS
    deploymentTarget: "15.0"
    sources:
      - path: CocktailCraft
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.cocktailcraft.app
        DEVELOPMENT_TEAM: "" # Your team ID will be set by Xcode
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: 1,2 # Universal (iPhone + iPad)
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
        ENABLE_BITCODE: NO
    preBuildScripts:
      - script: |
          cd "$SRCROOT/.." 
          ./gradlew :shared:generateDummyFramework
        name: Generate Dummy Framework
        outputFiles:
          - $(SRCROOT)/../shared/build/cocoapods/framework/shared.framework