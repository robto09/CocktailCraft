name: CocktailCraft
options:
  bundleIdPrefix: com.cocktailcraft
  deploymentTarget:
    iOS: "17.0"
  
targets:
  CocktailCraft:
    type: application
    platform: iOS
    sources:
      - CocktailCraft
    # The shared KMP framework is integrated via CocoaPods (pod 'shared',
    # :path => '../shared'). After regenerating with `xcodegen generate`,
    # run `pod install` to re-attach the Pods build phases and workspace.
    dependencies:
      - target: CocktailCraftWidgets
        embed: true
    # App Group shared with the widget extension (widget data snapshots).
    # DEVELOPMENT_TEAM is empty, so this signs for the simulator only;
    # device builds need a team for the App Group capability.
    entitlements:
      path: CocktailCraft/CocktailCraft.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cocktailcraft
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.cocktailcraft.CocktailCraft
      DEVELOPMENT_TEAM: ""
      # With GENERATE_INFOPLIST_FILE, the processed Info.plist takes its
      # version keys from these settings; leaving them unset strips
      # CFBundleVersion/CFBundleShortVersionString from the built app and
      # mismatches the widget extension (which ships 1 / 1.0).
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      SWIFT_VERSION: "5.10"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      ENABLE_PREVIEWS: true
      GENERATE_INFOPLIST_FILE: true
      INFOPLIST_FILE: CocktailCraft/Info.plist
      INFOPLIST_KEY_UIApplicationSceneManifest_Generation: true
      INFOPLIST_KEY_UIApplicationSupportsIndirectInputEvents: true
      INFOPLIST_KEY_UILaunchScreen_Generation: true
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPad: "UIInterfaceOrientationPortrait UIInterfaceOrientationPortraitUpsideDown UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      INFOPLIST_KEY_UISupportedInterfaceOrientations_iPhone: "UIInterfaceOrientationPortrait UIInterfaceOrientationLandscapeLeft UIInterfaceOrientationLandscapeRight"
      FRAMEWORK_SEARCH_PATHS:
        - "$(inherited)"
      OTHER_LDFLAGS:
        - "$(inherited)"
    
  CocktailCraftWidgets:
    type: app-extension
    platform: iOS
    sources:
      - CocktailCraftWidgets
      # Deep-link format, App Group id, and the snapshot models/store are
      # compiled into both the app and the widget so they cannot drift.
      - path: CocktailCraft/Utils/WidgetBridge.swift
    info:
      path: CocktailCraftWidgets/Info.plist
      properties:
        CFBundleDisplayName: CocktailCraft
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
        # ATS pinning is per-bundle: without this mirror of the app's pin
        # set, the Random Cocktail widget's thecocktaildb.com traffic would
        # bypass the certificate pinning the app enforces. Keep in sync with
        # CocktailCraft/Info.plist and the Android
        # network_security_config.xml (same Cloudflare CA pool).
        NSAppTransportSecurity:
          NSPinnedDomains:
            thecocktaildb.com:
              NSIncludesSubdomains: true
              NSPinnedCAIdentities:
                - SPKI-SHA256-BASE64: kIdp6NNEd8wsugYyyIYFsi1ylMCED3hZbSR8ZFsa/A4=
                - SPKI-SHA256-BASE64: mEflZT5enoR1FuXLgYYGqnVEoZvmf9c2bVBpiOjYQ0c=
                - SPKI-SHA256-BASE64: hxqRlPTu1bMS/0DITB1SSu0vd4u/8l8TjPgfaAp63Gc=
                - SPKI-SHA256-BASE64: Vfd95BwDeSQo+NUYxVEEIlvkOlWY2SalKK1lPhzOx78=
                - SPKI-SHA256-BASE64: QXnt2YHvdHR3tJYmQIr0Paosp6t/nggsEGD4QJZ3Q0g=
                - SPKI-SHA256-BASE64: CLOmM1/OXvSPjw5UOYbAf9GKOxImEp9hhku9W90fHMk=
                - SPKI-SHA256-BASE64: C5+lpZ7tcVwmwQIMcRtPbsQtWLABXhQzejna0wHFr8M=
                - SPKI-SHA256-BASE64: diGVwiVYbubAI3RW4hB9xU8e/CH2GnkuvVFZE8zmgzI=
                - SPKI-SHA256-BASE64: 0cRTd+vc1hjNFlHcLgLCHXUeWqn80bNDH/bs9qMTSPo=
                - SPKI-SHA256-BASE64: oyD01TTXvpfBro3QSZc1vIlcMjrdLTiL/M9mLCPX+Zo=
                - SPKI-SHA256-BASE64: K89VOmb1cJAN3TK6bf4ezAbJGC1mLcG2Dh97dnwr3VQ=
                - SPKI-SHA256-BASE64: G/ANXI8TwJTdF+AFBM8IiIUPEv0Gf6H5LA/b9guG4yE=
    entitlements:
      path: CocktailCraftWidgets/CocktailCraftWidgets.entitlements
      properties:
        com.apple.security.application-groups:
          - group.com.cocktailcraft
    settings:
      PRODUCT_BUNDLE_IDENTIFIER: com.cocktailcraft.CocktailCraft.Widgets
      DEVELOPMENT_TEAM: ""
      CURRENT_PROJECT_VERSION: "1"
      MARKETING_VERSION: "1.0"
      SWIFT_VERSION: "5.10"
      IPHONEOS_DEPLOYMENT_TARGET: "17.0"
      SKIP_INSTALL: true

  CocktailCraftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - CocktailCraftTests
    dependencies:
      - target: CocktailCraft
    settings:
      TEST_HOST: "$(BUILT_PRODUCTS_DIR)/CocktailCraft.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/CocktailCraft"
      BUNDLE_LOADER: "$(TEST_HOST)"
      SWIFT_VERSION: "5.10"
      GENERATE_INFOPLIST_FILE: true

  CocktailCraftUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - CocktailCraftUITests
    dependencies:
      - target: CocktailCraft
    settings:
      TEST_TARGET_NAME: CocktailCraft
      SWIFT_VERSION: "5.10"
      GENERATE_INFOPLIST_FILE: true

schemes:
  CocktailCraft:
    build:
      targets:
        CocktailCraft: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - CocktailCraftTests
        - CocktailCraftUITests
    archive:
      config: Release
